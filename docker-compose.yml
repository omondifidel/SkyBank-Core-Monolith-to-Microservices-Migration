version: '3.8'

services:
  # The Database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: skyadmin
      POSTGRES_PASSWORD: skypassword
      POSTGRES_DB: skybank_db
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  # The Brain (Backend)
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://skyadmin:skypassword@db:5432/skybank_db"
    depends_on:
      - db

  # The Face (Frontend)
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend