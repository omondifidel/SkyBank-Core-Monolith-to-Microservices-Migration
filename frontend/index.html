<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyBank | Secure Digital Banking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight"><i class="fas fa-cloud-showers-heavy mr-2"></i>SkyBank</h1>
            <div class="space-x-6">
                <span class="opacity-80">Welcome, <strong>Sky User</strong></span>
                <button class="bg-blue-700 hover:bg-blue-800 px-4 py-2 rounded-lg transition">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 px-4 max-w-4xl">
        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mb-8 flex justify-between items-center">
            <div>
                <p class="text-sm uppercase tracking-widest text-slate-500 font-semibold">Total Available Balance</p>
                <h2 id="balance" class="text-5xl font-extrabold text-blue-600 mt-2">Loading...</h2>
            </div>
            <div class="h-16 w-16 bg-blue-100 rounded-full flex items-center justify-center text-blue-600">
                <i class="fas fa-wallet text-2xl"></i>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-lg font-bold mb-4 flex items-center">
                    <i class="fas fa-exchange-alt mr-2 text-blue-500"></i> Quick Transfer
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">Amount (USD)</label>
                        <input type="number" id="amount" placeholder="0.00" 
                               class="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <button onclick="makeTransfer()" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-md transition transform active:scale-95">
                        Send Money
                    </button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-lg font-bold mb-4 flex items-center">
                    <i class="fas fa-history mr-2 text-blue-500"></i> Recent Activity
                </h3>
                <ul class="space-y-4 opacity-60">
                    <li class="flex justify-between text-sm border-b pb-2">
                        <span>Grocery Store</span>
                        <span class="font-mono">-$45.20</span>
                    </li>
                    <li class="flex justify-between text-sm border-b pb-2">
                        <span>Salary Deposit</span>
                        <span class="font-mono text-green-600">+$2,400.00</span>
                    </li>
                </ul>
                <p class="text-xs text-center mt-4 text-slate-400 italic font-mono uppercase tracking-tighter">Microservices-Powered System</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
